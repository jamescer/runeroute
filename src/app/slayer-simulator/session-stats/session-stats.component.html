<div class="session-stats">
  <h2>Session Stats</h2>
  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-label">Master</span>
      <span class="stat-value">{{ masterName }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Assignments</span>
      <span class="stat-value">{{ assignmentCount }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Monsters Slain</span>
      <span class="stat-value">{{ totalKills }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Slayer Points</span>
      <span class="stat-value points">{{ pointsEarned }}</span>
    </div>
  </div>
  <button (click)="reset.emit()" class="btn btn-secondary w-100">Reset Session</button>
</div>
